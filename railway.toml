[build]
builder = "dockerfile"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "sh scripts/start.sh"
healthcheckPath = "/health"
# 300s is generous but the container boots 4 Node processes via tsx (on-
# the-fly TS transpile) plus the producer worker lazily deploys a
# Remotion Lambda function on first boot (60-90s to tarball + upload).
# The API process itself is ready in a few seconds on a healthy run; the
# extra budget just keeps us from failing on a cold machine or an AWS
# region blip during the Lambda bootstrap.
healthcheckTimeout = 300
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3

# Persistent volume for the SQLite queue, in-flight job work/ dirs, and the
# TTS cache. Finished render outputs live on S3 (RENDER_MODE=lambda + S3
# lifecycle rules in src/lib/s3Outputs.ts), and the HuggingFace model
# cache lives in the image layer (HF_HOME=/opt/hf-cache in Dockerfile),
# so this volume stays small. 5 GB comfortably holds the DB + peak
# concurrent job working-set.
[[deploy.volumes]]
mountPath = "/app/storage"
sizeMB = 5000
